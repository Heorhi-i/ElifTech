<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Shops page</title>
   <link rel="stylesheet" href="styles/style.css">
</head>

<body>
   <header>
      <nav>
         <a href="" class="navi">Shop</a> |
         <a href="" class="navi">Shopping Cart</a>
      </nav>
   </header>
   <div class="block">
      <div class="formation">
         <div class="input-fild">
            <p>Name:</p><br />
            <input type="text" name="Name" placeholder="input" /><br />
         </div>
         <div class="input-fild">
            <p>Email:</p><br />
            <input type="email" name="user_email" placeholder="input" /><br />
         </div>
         <div class="input-fild">
            <p>Phone:</p><br />
            <input type="tel" name="user_phone" placeholder="input" /><br />
         </div>
         <div class="input-fild">
            <p>Adress:</p><br />
            <input type="text" name="Adress" placeholder="input" /><br />
         </div>
      </div>
      <div class="cart">
         <div class="purchase-cart">
            <img src="images/burger.jpg" alt="Burger" width="300" height="150">
            <div class="chose-interface">
               <h2 class="name-purchase-chose">Big Big Burger</h2><br />
               <div class="prise">
                  <p>Price:</p>
                  <p>888</p>
               </div><br />
               <input type="number" id="ticketNum" name="ticketNum" value="1" min="1" max="100" step="1">
            </div>
         </div>
         <div class="purchase-cart">
            <img src="images/burger.jpg" alt="Burger" width="300" height="150">
            <div class="chose-interface">
               <h2 class="name-purchase-chose">Big Big Burger</h2><br />
               <div class="prise">
                  <p>Price:</p>
                  <p>888</p>
               </div><br />
               <input type="number" id="ticketNum" name="ticketNum" value="1" min="1" max="100" step="1">
            </div>
         </div>
         <div class="purchase-cart">
            <img src="images/burger.jpg" alt="Burger" width="300" height="150">
            <div class="chose-interface">
               <h2 class="name-purchase-chose">Big Big Burger</h2><br />
               <div class="prise">
                  <p>Price:</p>
                  <p>888</p>
               </div><br />
               <input type="number" id="ticketNum" name="ticketNum" value="1" min="1" max="100" step="1">
            </div>
         </div>
         <div class="purchase-cart">
            <img src="images/burger.jpg" alt="Burger" width="300" height="150">
            <div class="chose-interface">
               <h2 class="name-purchase-chose">Big Big Burger</h2><br />
               <div class="prise">
                  <p>Price:</p>
                  <p>888</p>
               </div><br />
               <input type="number" id="ticketNum" name="ticketNum" value="1" min="1" max="100" step="1">
            </div>
         </div>
         <div class="add-cart">
         </div>
      </div>
      <div class="confirmation">
         <div class="total-prise">
            <p>Total price: </p>
            <p class="prise-total-value">999</p>
         </div>
         <div class="submit">
            <a href="" class="submit-href">
               <div class="submit-link">Submit</div>
            </a>
         </div>
      </div>
   </div>
</body>

</html>
